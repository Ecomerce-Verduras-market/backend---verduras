server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: gateway-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH:20}
            redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST:40}
        - AddRequestHeader=X-Gateway, verduritas-gateway
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates: [ Path=/api/auth/** ]
        - id: users
          uri: lb://user-service
          predicates: [ Path=/api/users/** ]
        - id: products
          uri: lb://product-service
          predicates: [ Path=/api/products/** ]
        - id: inventory
          uri: lb://inventory-service
          predicates: [ Path=/api/inventory/** ]
        - id: orders
          uri: lb://order-service
          predicates: [ Path=/api/orders/** ]
        - id: payments
          uri: lb://payment-service
          predicates: [ Path=/api/payments/** ]

security:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-with-at-least-32-chars}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
