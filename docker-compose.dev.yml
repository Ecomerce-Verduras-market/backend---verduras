services:
  discovery-service:
    build:
      context: .
      args: { SERVICE: discovery-service }
    environment:
      SERVER_PORT: 8761
    ports: ["8761:8761"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 20s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports: ["5672:5672", "15672:15672"]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 5s
      retries: 10

  postgres-db:
    image: postgres:16-alpine
    environment: { POSTGRES_DB: verduritas_db, POSTGRES_USER: root, POSTGRES_PASSWORD: rroot }
    ports: ["5439:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  gateway-service:
    build:
      context: .
      args: { SERVICE: gateway-service }
    environment:
      SERVER_PORT: 8080
      EUREKA_URI: http://discovery-service:8761/eureka
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-with-at-least-32-chars}
    ports: ["8080:8080"]
    depends_on:
      discovery-service: { condition: service_healthy }
      redis: { condition: service_healthy }

  auth-service:
    build:
      context: .
      args: { SERVICE: auth-service }
    environment:
      SERVER_PORT: 8081
      DB_URL: jdbc:postgresql://postgres-db:5432/verduritas_db?currentSchema=auth_service
      DB_USERNAME: root
      DB_PASSWORD: rroot
      DB_SCHEMA: auth_service
      EUREKA_URI: http://discovery-service:8761/eureka
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-with-at-least-32-chars}
    depends_on:
      discovery-service: { condition: service_healthy }
      postgres-db: { condition: service_healthy }

  user-service:
    build:
      context: .
      args: { SERVICE: user-service }
    environment: { SERVER_PORT: 8082, DB_URL: jdbc:postgresql://postgres-db:5432/verduritas_db?currentSchema=user_service, DB_USERNAME: root, DB_PASSWORD: rroot, DB_SCHEMA: user_service, EUREKA_URI: http://discovery-service:8761/eureka }
    depends_on:
      discovery-service: { condition: service_healthy }
      postgres-db: { condition: service_healthy }

  product-service:
    build:
      context: .
      args: { SERVICE: product-service }
    environment: { SERVER_PORT: 8083, DB_URL: jdbc:postgresql://postgres-db:5432/verduritas_db?currentSchema=product_service, DB_USERNAME: root, DB_PASSWORD: rroot, DB_SCHEMA: product_service, REDIS_HOST: redis, EUREKA_URI: http://discovery-service:8761/eureka }
    depends_on:
      discovery-service: { condition: service_healthy }
      postgres-db: { condition: service_healthy }
      redis: { condition: service_healthy }

  inventory-service:
    build:
      context: .
      args: { SERVICE: inventory-service }
    environment: { SERVER_PORT: 8084, DB_URL: jdbc:postgresql://postgres-db:5432/verduritas_db?currentSchema=inventory_service, DB_USERNAME: root, DB_PASSWORD: rroot, DB_SCHEMA: inventory_service, RABBITMQ_HOST: rabbitmq, EUREKA_URI: http://discovery-service:8761/eureka }
    depends_on:
      discovery-service: { condition: service_healthy }
      postgres-db: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }

  order-service:
    build:
      context: .
      args: { SERVICE: order-service }
    environment: { SERVER_PORT: 8085, DB_URL: jdbc:postgresql://postgres-db:5432/verduritas_db?currentSchema=order_service, DB_USERNAME: root, DB_PASSWORD: rroot, DB_SCHEMA: order_service, RABBITMQ_HOST: rabbitmq, EUREKA_URI: http://discovery-service:8761/eureka }
    depends_on:
      discovery-service: { condition: service_healthy }
      postgres-db: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }

  payment-service:
    build:
      context: .
      args: { SERVICE: payment-service }
    environment: { SERVER_PORT: 8086, DB_URL: jdbc:postgresql://postgres-db:5432/verduritas_db?currentSchema=payment_service, DB_USERNAME: root, DB_PASSWORD: rroot, DB_SCHEMA: payment_service, RABBITMQ_HOST: rabbitmq, EUREKA_URI: http://discovery-service:8761/eureka }
    depends_on:
      discovery-service: { condition: service_healthy }
      postgres-db: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }

  notification-service:
    build:
      context: .
      args: { SERVICE: notification-service }
    environment: { SERVER_PORT: 8087, RABBITMQ_HOST: rabbitmq, EUREKA_URI: http://discovery-service:8761/eureka }
    depends_on:
      discovery-service: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
